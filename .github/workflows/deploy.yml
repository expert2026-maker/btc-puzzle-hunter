name: Deploy to Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Inject Keys
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SB_URL }}|g" index.html
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SB_ANON }}|g" index.html
          sed -i "s|__SUPABASE_URL__|${{ secrets.SB_URL }}|g" admin.html
          sed -i "s|__SUPABASE_SERVICE_KEY__|${{ secrets.SB_SERVICE }}|g" admin.html
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
