<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTC Puzzle Hunter</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root { --bg:#06060f; --surface:#0e0e1c; --card:#131326; --accent:#f7931a; --text:#e2e2f0; }
body { background:var(--bg); color:var(--text); font-family:sans-serif; margin:0; padding:20px; }
.screen { display:none; }
.screen.active { display:block; }
.card { background:var(--card); padding:20px; border-radius:10px; margin-bottom:10px; cursor:pointer; border:1px solid #333; }
.btn { padding:10px 20px; background:var(--accent); border:none; border-radius:5px; cursor:pointer; color:black; font-weight:bold; }
</style>
</head>
<body>

<div id="screenSelect" class="screen active">
  <h1>Выберите пазл</h1>
  <div class="card" onclick="selectPuzzle(71)">Puzzle #71 (7.1 BTC)</div>
  <div class="card" onclick="selectPuzzle(135)">Puzzle #135 (13.5 BTC)</div>
</div>

<div id="screenMain" class="screen">
  <button class="btn" onclick="showScreen('screenSelect')">← Назад</button>
  <h1 id="puzzleTitle">Puzzle #--</h1>
  <p>Статус: Готов к поиску</p>
  <button class="btn" onclick="alert('Поиск запущен!')">Начать поиск</button>
</div>

<script>
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function selectPuzzle(num) {
    console.log("Selected:", num);
    document.getElementById('puzzleTitle').innerText = "Puzzle #" + num;
    showScreen('screenMain');
  }

  window.onload = () => {
    console.log("App ready");
    if(window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.ready();
  };
</script>
</body>
</html>
